# nginx/riskuw.conf
# ─────────────────────────────────────────────────────────────────────────────
# Install: sudo ln -s /opt/riskuw/nginx/riskuw.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# Assumes certbot has already run: sudo certbot --nginx -d riskuw.online -d www.riskuw.online
# ─────────────────────────────────────────────────────────────────────────────

# Redirect bare HTTP → HTTPS
server {
    listen 80;
    server_name riskuw.online www.riskuw.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name riskuw.online www.riskuw.online;

    # TLS — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/riskuw.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/riskuw.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options          "DENY"              always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin"     always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── React SPA (main UI) ───────────────────────────────────────────────────
    root /var/www/riskuw;
    index index.html;

    location / {
        # All non-API routes → index.html (React Router handles client-side routing)
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Static assets with long cache
    location ~* \.(js|css|woff2|woff|ttf|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── FastAPI backend ───────────────────────────────────────────────────────
    # Handles: /auth/*, /products/*, /underwriting/*, /queue/*, /batch/*, /tenants/*
    location ~ ^/(auth|products|underwriting|queue|batch|tenants|users|letter-templates|health) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;

        # Longer timeout for batch evaluate (may take 30s+)
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;

        # CORS — FastAPI sets its own; nginx should not add duplicate headers
        proxy_hide_header  Access-Control-Allow-Origin;
    }

    # ── FastAPI OpenAPI docs (dev only — restrict in prod) ────────────────────
    location ~ ^/(docs|redoc|openapi.json) {
        # Uncomment to restrict to VPN/internal:
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── Streamlit (legacy, port 8501) ─────────────────────────────────────────
    location /streamlit/ {
        proxy_pass         http://127.0.0.1:8501/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 300s;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/riskuw_access.log;
    error_log  /var/log/nginx/riskuw_error.log warn;
}
