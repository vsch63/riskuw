# /etc/nginx/sites-available/riskuw
# ─────────────────────────────────────────────────────────────────────────────
# Host nginx — RiskUW (runs alongside DNB)
#
# DNB's nginx container owns :80 and :443 on the laptop.
# On HETZNER SERVER this host nginx owns :80/:443 with Certbot SSL.
#
# Apply on Hetzner:
#   cp riskuw-nginx-host.conf /etc/nginx/sites-available/riskuw
#   ln -sf /etc/nginx/sites-available/riskuw /etc/nginx/sites-enabled/riskuw
#   nginx -t && systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name riskuw.online www.riskuw.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name riskuw.online www.riskuw.online;

    # TLS — Certbot managed (unchanged)
    ssl_certificate     /etc/letsencrypt/live/riskuw.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/riskuw.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"        always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header Strict-Transport-Security "max-age=63072000"  always;

    client_max_body_size 500M;

    # ── React frontend + API — Docker container on :3002 ─────────────────────
    # The riskuw_frontend container's nginx handles:
    #   /          → React SPA (index.html)
    #   /auth/*    → proxy to riskuw_fastapi:8000 (internal Docker network)
    #   /products/* etc.
    location / {
        proxy_pass          http://127.0.0.1:3002;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Authorization     $http_authorization;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_buffering     off;
    }

    # ── Streamlit UW engine — still bare-metal on :8502 ──────────────────────
    location /uw/ {
        proxy_pass          http://127.0.0.1:8502/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  300s;
    }

    access_log /var/log/nginx/riskuw_access.log;
    error_log  /var/log/nginx/riskuw_error.log warn;
}
