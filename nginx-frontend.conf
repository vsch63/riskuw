# docker/nginx-frontend.conf
# ─────────────────────────────────────────────────────────────────────────────
# Runs INSIDE the riskuw_frontend container on port 80.
# Handles React SPA routing and proxies API calls to riskuw_fastapi:8000
# (container-to-container on riskuw-network — no host port needed).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/x-font-ttf image/svg+xml;
    gzip_min_length 1000;

    # React Router — all non-asset routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Vite-hashed static assets — aggressive cache
    location ~* \.(js|css|woff2|woff|ttf|svg|png|ico|webp|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API routes — proxy to FastAPI container on internal Docker network ────
    location ~ ^/(auth|products|underwriting|queue|batch|tenants|users|letter-templates|health|rules|custom-rules|scales|physicians|reinsurance|notifications|output-interface|system|reports|docs|redoc|openapi.json) {
        proxy_pass          http://fastapi:8000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $http_host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Authorization     $http_authorization;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        client_max_body_size 500M;
    }

    access_log /var/log/nginx/frontend_access.log;
    error_log  /var/log/nginx/frontend_error.log warn;
}
