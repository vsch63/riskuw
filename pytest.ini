[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Pure unit tests — no DB or HTTP required
    integration: Requires live DB and running API
    slow: Tests that take more than 2 seconds
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
